name: PR Autoclose Issues

on:
  pull_request_target:
    types: [opened, synchronize, edited, reopened, ready_for_review]

permissions:
  pull-requests: write
  issues: read
  contents: read

jobs:
  autoclose:
    name: Update PR closes footer
    runs-on: ubuntu-latest

    steps:
      - name: Update PR body with closes list
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request

            if (pr.base?.ref !== 'main') {
              core.info(`Skipping: base is ${pr.base?.ref}`)
              return
            }

            const headRef = pr.head?.ref ?? ''
            if (!/^release\/v/.test(headRef)) {
              core.info(`Skipping: head is ${headRef}`)
              return
            }

            const owner = context.repo.owner
            const repo = context.repo.repo
            const issueRegex = /#(\d+)/g
            const found = new Set()

            function collectFrom(text) {
              if (!text) return
              for (const match of text.matchAll(issueRegex)) {
                found.add(Number(match[1]))
              }
            }

            collectFrom(pr.title)
            collectFrom(pr.body)

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            })

            const commitShas = new Set()
            for (const commit of commits) {
              commitShas.add(commit.sha)
              collectFrom(commit?.commit?.message ?? '')
            }

            async function collectLinkedBranchIssues() {
              const query = `
                query($owner: String!, $name: String!, $after: String) {
                  repository(owner: $owner, name: $name) {
                    issues(states: [OPEN, CLOSED], first: 100, after: $after) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        number
                        linkedBranches(first: 20) {
                          nodes {
                            ref {
                              name
                              target {
                                ... on Commit { oid }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `

              let cursor = null

              while (true) {
                const result = await github.graphql(query, {
                  owner,
                  name: repo,
                  after: cursor,
                })

                const issues = result.repository.issues

                for (const issue of issues.nodes) {
                  for (const branch of issue.linkedBranches.nodes) {
                    const oid = branch.ref?.target?.oid
                    if (!oid) {
                      continue
                    }

                    if (commitShas.has(oid)) {
                      found.add(issue.number)
                      continue
                    }

                    try {
                      const { data } = await github.rest.repos.compareCommits({
                        owner,
                        repo,
                        base: oid,
                        head: pr.head.sha,
                      })

                      if (data.status === 'ahead' || data.status === 'identical') {
                        found.add(issue.number)
                      }
                    } catch (error) {
                      core.info(`Could not compare linked branch for issue #${issue.number}: ${error}`)
                    }
                  }
                }

                if (!issues.pageInfo.hasNextPage) {
                  break
                }

                cursor = issues.pageInfo.endCursor
              }
            }

            await collectLinkedBranchIssues()

            found.delete(pr.number)

            const sorted = [...found].sort((a, b) => a - b)
            const closesLine = sorted.length
              ? `Closes ${sorted.map(n => `#${n}`).join(', ')}`
              : 'Closes (none detected)'

            const start = '<!-- trustbird:autoclose:start -->'
            const end = '<!-- trustbird:autoclose:end -->'

            const block = [
              start,
              closesLine,
              end,
            ].join('\n')

            const currentBody = pr.body ?? ''
            let nextBody

            const startIdx = currentBody.indexOf(start)
            const endIdx = currentBody.indexOf(end)

            if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
              nextBody = currentBody.slice(0, startIdx) + block + currentBody.slice(endIdx + end.length)
            } else {
              const trimmed = currentBody.trimEnd()
              nextBody = trimmed.length ? `${trimmed}\n\n${block}\n` : `${block}\n`
            }

            if (nextBody === currentBody) {
              core.info('PR body already up-to-date.')
              return
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              body: nextBody,
            })

name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '^12.0'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '^12.0'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '^12.0'
            testbench: '^10.0'
          - php: '8.5'
            laravel: '^12.0'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '^13.0'
            testbench: '^11.0'
          - php: '8.4'
            laravel: '^13.0'
            testbench: '^11.0'
          - php: '8.5'
            laravel: '^13.0'
            testbench: '^11.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: xdebug

      - name: Validate changelog is publishable
        run: |
          set -euo pipefail

          # Only enforce publishable changelog on PRs from release/vX branches.
          if [ "${GITHUB_EVENT_NAME:-}" != "pull_request" ]; then
            exit 0
          fi

          BRANCH="${GITHUB_HEAD_REF:-}"

          if ! echo "$BRANCH" | grep -qE '^release/v'; then
            exit 0
          fi

          VERSION="$(echo "$BRANCH" | sed -nE 's/^release\/v(.+)$/\1/p')"

          if [ -z "$VERSION" ]; then
            echo "Could not parse version from release branch name: $BRANCH"
            exit 1
          fi

          if grep -nE "## \\[$VERSION\\] - [Uu]npublished" CHANGELOG.md; then
            echo "CHANGELOG.md contains an 'Unpublished' release header for [$VERSION]. Replace it with an ISO date (YYYY-MM-DD) before merging."
            exit 1
          fi

          if ! grep -nE "^## \\[$VERSION\\] - [0-9]{4}-[0-9]{2}-[0-9]{2}" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a release header for [$VERSION] with an ISO date (YYYY-MM-DD)."
            echo "Expected something like: ## [$VERSION] - 2026-07-07"
            exit 1
          fi

      - name: Configure Laravel version
        run: |
          composer require \
            illuminate/support:${{ matrix.laravel }} \
            illuminate/database:${{ matrix.laravel }} \
            orchestra/testbench:${{ matrix.testbench }} \
            --no-interaction \
            --no-update

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: composer test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: tests

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: xdebug

      - name: Validate changelog is publishable
        run: |
          set -euo pipefail

          # Only enforce publishable changelog on PRs from release/vX branches.
          if [ "${GITHUB_EVENT_NAME:-}" != "pull_request" ]; then
            exit 0
          fi

          BRANCH="${GITHUB_HEAD_REF:-}"

          if ! echo "$BRANCH" | grep -qE '^release/v'; then
            exit 0
          fi

          VERSION="$(echo "$BRANCH" | sed -nE 's/^release\/v(.+)$/\1/p')"

          if [ -z "$VERSION" ]; then
            echo "Could not parse version from release branch name: $BRANCH"
            exit 1
          fi

          if grep -nE "## \\[$VERSION\\] - [Uu]npublished" CHANGELOG.md; then
            echo "CHANGELOG.md contains an 'Unpublished' release header for [$VERSION]. Replace it with an ISO date (YYYY-MM-DD) before merging."
            exit 1
          fi

          if ! grep -nE "^## \\[$VERSION\\] - [0-9]{4}-[0-9]{2}-[0-9]{2}" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a release header for [$VERSION] with an ISO date (YYYY-MM-DD)."
            echo "Expected something like: ## [$VERSION] - 2026-07-07"
            exit 1
          fi

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run coverage
        run: |
          composer test:coverage -- --coverage-clover clover.xml > coverage_output.txt 2>&1 || true
          cat coverage_output.txt
          PERCENTAGE=$(grep -oP '\d+\.\d+(?=%| Lines)' coverage_output.txt | head -n 1 || echo "0.0")
          echo "COVERAGE=$PERCENTAGE%" >> $GITHUB_ENV

      - name: Create Coverage Badge
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: laravel-trustbird-coverage.json
          label: coverage
          message: ${{ env.COVERAGE }}
          color: green
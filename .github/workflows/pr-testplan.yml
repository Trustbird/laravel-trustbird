name: PR Test Plan

on:
  check_suite:
    types: [completed]
  workflow_run:
    workflows: [Tests, Coverage]
    types: [completed]

permissions:
  pull-requests: write
  checks: read
  contents: read

jobs:
  testplan:
    name: Update PR test plan checkmarks
    runs-on: ubuntu-latest

    steps:
      - name: Update test plan when all checks pass
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo

            let headSha = null

            if (context.payload.check_suite) {
              if (context.payload.check_suite.conclusion !== 'success') {
                core.info(`Check suite conclusion: ${context.payload.check_suite.conclusion}`)
                return
              }

              headSha = context.payload.check_suite.head_sha
            }

            if (context.payload.workflow_run) {
              if (context.payload.workflow_run.conclusion !== 'success') {
                core.info(`Workflow run conclusion: ${context.payload.workflow_run.conclusion}`)
                return
              }

              headSha = context.payload.workflow_run.head_sha
            }

            if (!headSha) {
              core.info('No head SHA found in event payload.')
              return
            }

            async function allChecksPassed(sha) {
              const checks = await github.paginate(github.rest.checks.listForRef, {
                owner,
                repo,
                ref: sha,
                per_page: 100,
              })

              if (checks.length === 0) {
                core.info(`No checks found for ${sha}`)
                return false
              }

              for (const check of checks) {
                if (check.status !== 'completed') {
                  core.info(`Check still running: ${check.name}`)
                  return false
                }

                if (!['success', 'skipped', 'neutral'].includes(check.conclusion ?? '')) {
                  core.info(`Check not successful: ${check.name} (${check.conclusion})`)
                  return false
                }
              }

              return true
            }

            if (!await allChecksPassed(headSha)) {
              core.info('Not all checks have passed yet.')
              return
            }

            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: headSha,
            })

            const releasePulls = pulls.filter((pr) => {
              return pr.base?.ref === 'main' && /^release\/v/.test(pr.head?.ref ?? '')
            })

            if (releasePulls.length === 0) {
              core.info('No release pull requests found for this commit.')
              return
            }

            const start = '<!-- trustbird:testplan:start -->'
            const end = '<!-- trustbird:testplan:end -->'

            const passedBlock = [
              start,
              '- [x] CI passes',
              '- [x] Changelog reviewed',
              '- [x] Docs navigation is in sync',
              end,
            ].join('\n')

            for (const pr of releasePulls) {
              const currentBody = pr.body ?? ''
              const startIdx = currentBody.indexOf(start)
              const endIdx = currentBody.indexOf(end)

              let nextBody

              if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
                nextBody = currentBody.slice(0, startIdx) + passedBlock + currentBody.slice(endIdx + end.length)
              } else {
                const testPlanPattern = /(## Test plan\s*\n\s*)(?:- \[[ x]\] .*\n)+/m
                if (!testPlanPattern.test(currentBody)) {
                  core.info(`PR #${pr.number} has no test plan block to update.`)
                  continue
                }

                nextBody = currentBody.replace(
                  testPlanPattern,
                  `$1${passedBlock}\n\n`
                )
              }

              if (nextBody === currentBody) {
                core.info(`PR #${pr.number} test plan already up-to-date.`)
                continue
              }

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                body: nextBody,
              })

              core.info(`Updated test plan checkmarks on PR #${pr.number}.`)
            }

name: Release Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    name: Create tag from changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version from changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          LINE="$(grep -m 1 -E '^## \[[^]]+\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$' CHANGELOG.md || true)"

          if [ -z "$LINE" ]; then
            echo "Could not find a publishable changelog header like: ## [0.1.0-alpha.4] - 2026-07-07"
            exit 1
          fi

          VERSION="$(echo "$LINE" | sed -E 's/^## \[([^]]+)\] - .+$/\1/')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag (if missing)
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.changelog.outputs.version }}"
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"
